name: Code Quality & Type Checking

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  typecheck:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: ESLint linting
        run: pnpm exec eslint . --ext .ts,.tsx,.js,.jsx
        continue-on-error: true

      - name: Report results
        if: always()
        run: |
          echo "✅ Code quality checks completed"
